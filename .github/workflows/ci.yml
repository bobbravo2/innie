name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — run on Linux with mock binaries (fast, no Homebrew needed)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Install bats and shellcheck
        run: |
          sudo apt-get install -y shellcheck
          sudo npm install -g bats

      - name: Run unit tests
        run: bats test/install.bats

  # ---------------------------------------------------------------------------
  # E2E — run the real script on macOS and verify every tool is available
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Run install script
        run: bash install.sh

      - name: Verify command-line tools are available
        run: |
          gcloud --version
          oc version --client
          gh --version
          uvx --version
          python3 --version
          pip3 --version
